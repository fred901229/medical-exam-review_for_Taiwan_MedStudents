<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>醫師二階國考複習平台</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩺</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1>醫師二階國考複習平台 <span style="font-size:0.65rem; font-weight:400; opacity:0.75">by Yu-Yuan Wu (KMU M109)</span></h1>
      <div style="display:flex;align-items:center;gap:12px">
        <span id="stats" class="stats"></span>
        <div class="font-ctrl">
          <button id="font-down" class="btn-theme" title="縮小字體">A-</button>
          <button id="font-up"   class="btn-theme" title="放大字體">A+</button>
        </div>
        <button id="theme-btn" class="btn-theme" title="切換深色模式">🌙</button>
      </div>
    </div>
  </header>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="filter-group">
        <label>年份</label>
        <select id="filter-year"><option value="">全部</option></select>
      </div>
      <div class="filter-group">
        <label>考次</label>
        <select id="filter-session"><option value="">全部</option></select>
      </div>
      <div class="filter-group">
        <label>考科</label>
        <select id="filter-subject"><option value="">全部</option></select>
      </div>
      <div class="filter-group">
        <label>搜尋</label>
        <input type="text" id="search" placeholder="輸入關鍵字...">
      </div>
      <div class="filter-group">
        <label>作答狀態</label>
        <select id="filter-status">
          <option value="">全部</option>
          <option value="unanswered">未作答</option>
          <option value="correct">答對</option>
          <option value="wrong">答錯（錯題本）</option>
          <option value="bookmarked">★ 收藏題</option>
        </select>
      </div>
      <button id="reset-btn" class="btn-secondary">重設篩選</button>
      <div class="random-row">
        <input type="number" id="random-count" value="1" min="1" max="50">
        <button id="random-btn" class="btn-random">隨機出題</button>
      </div>
      <div id="filter-stats" class="filter-stats"></div>
      <div id="progress-stats" class="progress-stats"></div>
      <button id="clear-progress-btn" class="btn-secondary" style="margin-top:6px;font-size:0.78rem;color:#94A3B8">清除作答紀錄</button>
      <div id="quiz-history" class="quiz-history"></div>
    </aside>

    <main class="content">
      <div id="quiz-bar" style="display:none">
        <div id="quiz-progress-text" class="quiz-progress-text"></div>
        <div class="quiz-progress-track"><div id="quiz-progress-bar" class="quiz-progress-fill"></div></div>
        <button onclick="exitQuizMode()" class="quiz-exit-btn">結束測驗</button>
      </div>
      <div id="quiz-summary" style="display:none"></div>
      <div id="question-list"></div>
      <div id="loading" class="loading">載入題庫中...</div>
    </main>
  </div>

  <button id="back-to-top" title="回到頂部">↑</button>
  <footer class="footer">
    <div>Created by Yu-Yuan Wu (KMU M109)</div>
  </footer>
  <script src="app.js"></script>
</body>
</html>
